<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kafíčko</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Kafíčko</h1>
        </header>

        <main>
            <div class="section">
                <label for="userSelect">Kdo dnes pije?</label>
                <select id="userSelect" required>
                    <option value="" disabled selected>Načítání uživatelů...</option>
                </select>
            </div>

            <div id="drinksContainer" class="section">
                <p>Načítání nápojů...</p>
            </div>

            <div class="summary-section">
                <strong>Dnešní skóre:</strong>
                <div id="dailySummaryContainer">Zatím prázdno...</div>
            </div>

            <button id="saveBtn" disabled>Uložit záznam (0)</button>
        </main>
    </div>
    
    <div id="toast" class="hidden"></div>

    <script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kafíčko</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Kafíčko</h1>
        </header>

        <main class="layout-grid">
            <aside class="sidebar">
                <div class="section">
                    <label for="userSelect">Kdo dnes pije?</label>
                    <select id="userSelect" required>
                        <option value="" disabled selected>Načítání uživatelů...</option>
                    </select>
                </div>

                <div class="summary-section">
                    <strong>Dnes vypito:</strong>
                    <div id="dailySummaryContainer" class="summary-text">Vyberte osobu...</div>
                </div>

                <button id="saveBtn" disabled>Uložit záznam (0)</button>
            </aside>

            <section class="drinks-section" id="drinksContainer">
                <div class="section">Načítání nápojů...</div>
            </section>
        </main>
    </div>
    
    <div id="toast" class="hidden"></div>

    <script src="app.js"></script>
</body>
</html>
